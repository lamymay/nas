<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>NAS Media Feed - Universal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: -apple-system, sans-serif; }
        #feedContainer { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        #feedContainer::-webkit-scrollbar { display: none; }

        .media-section { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; align-items: center; justify-content: center; }
        .media-content { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 中间状态图标 */
        .state-icon {
            position: absolute; font-size: 60px; color: rgba(255,255,255,0.5);
            opacity: 0; transform: translate(-50%, -50%) scale(1.5); transition: 0.2s;
            z-index: 5; left: 50%; top: 50%; pointer-events: none;
        }
        .paused .state-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* UI层：现在它是交互的核心 */
        .video-ui-layer {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end;
            background: transparent; z-index: 10; cursor: pointer;
        }
        /* 只有在显示时才展示渐变底色，增加按钮可读性 */
        .video-ui-layer.visible {
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 25%);
        }

        .controls-wrapper { padding: 20px 15px 40px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .video-ui-layer.visible .controls-wrapper { opacity: 1; pointer-events: auto; }

        .progress-container { width: 100%; height: 20px; display: flex; align-items: center; cursor: pointer; }
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .progress-fill { height: 100%; background: #fe2c55; width: 0%; border-radius: 2px; position: relative; }
        .progress-fill::after { content: ''; position: absolute; right: -5px; top: -3px; width: 10px; height: 10px; background: #fff; border-radius: 50%; }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .time-text { font-size: 12px; color: #eee; font-family: monospace; }
        .speed-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }

        .info-overlay { position: absolute; bottom: 110px; left: 15px; pointer-events: none; z-index: 8; }
        .display-name { font-size: 16px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="feedContainer"></div>

<script>
    let cursor = 1;
    const step = 20;
    let isLoading = false;
    const container = document.getElementById('feedContainer');

    async function loadMore() {
        if (isLoading) return;
        isLoading = true;
        try {
            const res = await fetch(`/nas/feed?cursor=${cursor}&step=${step}&contentType=VIDEO&deviceId=1`);
            const data = await res.json();
            if (data.content && data.content.length > 0) {
                renderMedia(data.content);
                cursor = data.cursor || (cursor + 1);
            }
        } catch (e) { console.error("加载失败", e); }
        finally { isLoading = false; }
    }

    function renderMedia(items) {
        items.forEach(item => {
            const section = document.createElement('div');
            section.className = 'media-section';
            const mediaUrl = item.segmentMap?.original?.[0]?.url;

            if (item.mediaType === 'VIDEO') {
                section.innerHTML = `
                    <div class="state-icon">▶</div>
                    <video class="media-content" data-file-code="${item.code}" data-src="${mediaUrl}" playsinline preload="metadata" loop></video>
                    <div class="video-ui-layer">
                        <div class="controls-wrapper">
                            <div class="progress-container">
                                <div class="progress-bg"><div class="progress-fill"></div></div>
                            </div>
                            <div class="bottom-bar">
                                <span class="time-text">00:00 / 00:00</span>
                                <button class="speed-btn">1.0X</button>
                            </div>
                        </div>
                    </div>
                    <div class="info-overlay"><div class="display-name">${item.displayName}</div></div>
                `;
                setupUniversalEvents(section, item.code);
            } else {
                section.innerHTML = `<img class="media-content" src="${mediaUrl}">`;
            }
            container.appendChild(section);
        });
        initObserver();
    }

    function setupUniversalEvents(section, fileCode) {
        const video = section.querySelector('video');
        const uiLayer = section.querySelector('.video-ui-layer');
        const progressFill = section.querySelector('.progress-fill');
        const progressContainer = section.querySelector('.progress-container');
        const speedBtn = section.querySelector('.speed-btn');
        const timeText = section.querySelector('.time-text');

        let uiTimer;

        // 核心修复：点击 UI 层控制全局
        uiLayer.addEventListener('click', (e) => {
            // 如果点击的是 UI 层本身（而不是按钮或进度条）
            if (e.target === uiLayer) {
                if (video.paused) {
                    video.play().catch(()=>{});
                    section.classList.remove('paused');
                    uiLayer.classList.remove('visible'); // 播放时隐藏UI
                } else {
                    video.pause();
                    section.classList.add('paused');
                    uiLayer.classList.add('visible'); // 暂停时显示UI
                    report(fileCode, video.currentTime);
                }
            } else {
                // 如果点击了按钮或进度条，重置自动隐藏计时器
                resetUITimer();
            }
        });

        function resetUITimer() {
            clearTimeout(uiTimer);
            if (!video.paused) {
                uiTimer = setTimeout(() => {
                    uiLayer.classList.remove('visible');
                }, 3000);
            }
        }

        // 进度条点击 (stopPropagation 确保不触发 uiLayer 的暂停逻辑)
        progressContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!video.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        // 倍速点击 (stopPropagation)
        const speeds = [1.0, 1.25, 1.5, 2.0];
        let sIdx = 0;
        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sIdx = (sIdx + 1) % speeds.length;
            video.playbackRate = speeds[sIdx];
            speedBtn.innerText = speeds[sIdx] + 'X';
        });

        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            const p = (video.currentTime / video.duration) * 100;
            progressFill.style.width = p + '%';
            timeText.innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        });
    }

    // 上报逻辑、Observer、TimeFormat 保持不变...
    async function report(fileCode, playAt) {
        if (!fileCode) return;
        fetch('/nas/feed/report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ fileCode, playAt: Math.floor(playAt * 1000), clientCode: "device_001" })
        }).catch(()=>{});
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function initObserver() {
        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target;
                if (e.isIntersecting) {
                    if (!v.src) v.src = v.getAttribute('data-src');
                    v.play().catch(() => {});
                    v.parentElement.classList.remove('paused');
                } else {
                    if (v.tagName === 'VIDEO') {
                        v.pause();
                        if (v.currentTime > 0) report(v.getAttribute('data-file-code'), v.currentTime);
                        v.removeAttribute('src');
                        v.load();
                    }
                }
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('video').forEach(v => obs.observe(v));
    }

    loadMore();
    container.addEventListener('scroll', () => {
        if (container.scrollTop + container.clientHeight >= container.scrollHeight - 300) loadMore();
    });
</script>
</body>
</html>
