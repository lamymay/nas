<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>NAS Media Feed</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: -apple-system, sans-serif; }
        #feedContainer { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        #feedContainer::-webkit-scrollbar { display: none; }
        .media-section { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; align-items: center; justify-content: center; }
        .media-content { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 自定义控制层 */
        .video-ui-layer {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 20%);
            opacity: 0; transition: opacity 0.3s; z-index: 10; pointer-events: none;
        }
        .video-ui-layer.visible { opacity: 1; pointer-events: auto; }

        /* 进度条样式 */
        .controls-wrapper { padding: 20px 15px 40px; }
        .progress-container { width: 100%; height: 14px; display: flex; align-items: center; cursor: pointer; margin-bottom: 10px; }
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; position: relative; flex: 1; }
        .progress-fill { height: 100%; background: #fe2c55; width: 0%; border-radius: 2px; }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; }
        .time-text { font-size: 12px; color: #eee; }
        .speed-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }

        .info-overlay { position: absolute; bottom: 100px; left: 15px; pointer-events: none; z-index: 5; }
        .display-name { font-size: 16px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.8); margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="feedContainer"></div>

<script>
    let cursor = 1;
    const step = 20;
    const container = document.getElementById('feedContainer');
    const REPORT_URL = 'https://172.20.10.5:9000/nas/api/report';

    async function loadMore() {
        try {
            const res = await fetch(`https://172.20.10.5:9000/nas/feed?cursor=${cursor}&step=${step}&contentType=VIDEO&deviceId=1`);
            const data = await res.json();
            if (data.content && data.content.length > 0) {
                renderMedia(data.content);
                cursor = data.cursor || (cursor + 1);
            }
        } catch (e) { console.error("加载失败", e); }
    }

    function renderMedia(items) {
        items.forEach(item => {
            const section = document.createElement('div');
            section.className = 'media-section';
            const mediaUrl = item.segmentMap?.original?.[0]?.url;

            if (item.mediaType === 'VIDEO') {
                // 去掉了 video 的 loop 属性，改为通过 JS 控制 ended 事件实现自动下一集或手动循环
                section.innerHTML = `
                    <video class="media-content" data-file-code="${item.code}" data-src="${mediaUrl}" playsinline preload="metadata"></video>
                    <div class="video-ui-layer">
                        <div class="controls-wrapper">
                            <div class="progress-container">
                                <div class="progress-bg"><div class="progress-fill"></div></div>
                            </div>
                            <div class="bottom-bar">
                                <span class="time-text">00:00</span>
                                <button class="speed-btn">1.0X</button>
                            </div>
                        </div>
                    </div>
                    <div class="info-overlay"><div class="display-name">${item.displayName}</div></div>
                `;
                setupVideoEvents(section, item.code);
            } else {
                section.innerHTML = `<img class="media-content" src="${mediaUrl}">`;
            }
            container.appendChild(section);
        });
        initObserver();
    }

    function setupVideoEvents(section, fileCode) {
        const video = section.querySelector('video');
        const ui = section.querySelector('.video-ui-layer');
        const progressFill = section.querySelector('.progress-fill');
        const progressContainer = section.querySelector('.progress-container');
        const speedBtn = section.querySelector('.speed-btn');
        const timeText = section.querySelector('.time-text');

        let uiTimer;
        let lastReportTime = 0;
        let initialReportDone = false;

        // 1. 点击画面显示/隐藏 UI
        video.addEventListener('click', () => {
            ui.classList.toggle('visible');
            if (ui.classList.contains('visible')) {
                clearTimeout(uiTimer);
                uiTimer = setTimeout(() => ui.classList.remove('visible'), 3000);
            }
        });

        // 2. 进度条点击跳转
        progressContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!video.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        // 3. 倍速切换
        const speeds = [1.0, 1.25, 1.5, 2.0];
        let sIdx = 0;
        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sIdx = (sIdx + 1) % speeds.length;
            video.playbackRate = speeds[sIdx];
            speedBtn.innerText = speeds[sIdx] + 'X';
        });

        // 4. 初次播放延迟 10ms 上报
        video.addEventListener('play', () => {
            if (!initialReportDone) {
                setTimeout(() => {
                    if (!video.paused) {
                        report(fileCode, video.currentTime);
                        initialReportDone = true;
                        lastReportTime = Date.now();
                    }
                }, 10);
            }
        });

        // 5. 更新进度与 30s 周期上报
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            const p = (video.currentTime / video.duration) * 100;
            progressFill.style.width = p + '%';
            timeText.innerText = formatTime(video.currentTime);

            const now = Date.now();
            if (now - lastReportTime > 30000) { // 30秒间隔
                report(fileCode, video.currentTime);
                lastReportTime = now;
            }
        });

        // 6. 自然播放完毕：上报并切到下一个视频
        video.addEventListener('ended', () => {
            report(fileCode, video.duration);
            const nextSection = section.nextElementSibling;
            if (nextSection && nextSection.classList.contains('media-section')) {
                nextSection.scrollIntoView({ behavior: 'smooth' });
            }
        });
    }

    async function report(fileCode, playAt) {
        if (!fileCode) return;
        const payload = {
            fileCode: fileCode,
            playAt: Math.floor(playAt * 1000), // 毫秒级上报
            clientCode: "device_001"
        };
        console.log("上报进度:", payload);
        fetch(REPORT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).catch(err => console.warn("上报失败:", err));
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function initObserver() {
        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target;
                const fCode = v.getAttribute('data-file-code');
                if (e.isIntersecting) {
                    if (!v.src) v.src = v.getAttribute('data-src');
                    v.play().catch(err => console.log("播放被拦截"));
                } else {
                    if (v.tagName === 'VIDEO') {
                        v.pause();
                        if (fCode && v.currentTime > 0) {
                            report(fCode, v.currentTime); // 划走时上报
                        }
                        v.removeAttribute('src');
                        v.load();
                    }
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('video').forEach(v => obs.observe(v));
    }

    // 初始加载
    loadMore();

    // 滚动加载逻辑
    container.addEventListener('scroll', () => {
        if (container.scrollTop + container.clientHeight >= container.scrollHeight - 200) {
            loadMore();
        }
    });
</script>
</body>
</html>
