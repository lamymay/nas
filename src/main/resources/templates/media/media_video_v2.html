<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>NAS Media Feed</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        /* 全屏滚动容器 */
        #feedContainer {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #feedContainer::-webkit-scrollbar { display: none; }

        .media-section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* 媒体内容自适应 */
        .media-content {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 底部信息浮层 */
        .info-overlay {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 70px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        .display-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta-info { font-size: 0.85rem; opacity: 0.8; }

        /* 右侧操作按钮 */
        .action-bar {
            position: absolute;
            right: 12px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }
        .btn-circle {
            width: 48px;
            height: 48px;
            background: rgba(40, 40, 40, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        /* 顶部状态提示 */
        #statusTip { position: fixed; top: 10px; width: 100%; text-align: center; z-index: 100; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="statusTip">NAS 媒体流</div>
<div id="feedContainer"></div>

<script>
    // 配置信息 - 根据你的请求自动提取
    let cursor = 1;
    const step = 20;
    let isLoading = false;
    let hasMore = true;

    const container = document.getElementById('feedContainer');

    async function loadMore() {
        if (isLoading || !hasMore) return;
        isLoading = true;

        try {
            // 这里替换为你真实的后端地址
            const url = `https://172.20.10.5:9000/nas/feed?cursor=${cursor}&step=${step}&contentType=VIDEO&deviceId=1`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.content && data.content.length > 0) {
                renderMedia(data.content);
                // 更新下一次请求的游标
                cursor = data.cursor || (cursor + 1);
                hasMore = data.hasMore === 1;
            } else {
                hasMore = false;
            }
        } catch (err) {
            console.error("加载数据失败:", err);
        } finally {
            isLoading = false;
        }
    }

    function renderMedia(items) {
        items.forEach(item => {
            // 安全获取 URL
            const mediaUrl = item.segmentMap?.original?.[0]?.url;
            if (!mediaUrl) return;

            const section = document.createElement('div');
            section.className = 'media-section';

            let mediaHtml = '';
            if (item.mediaType === 'IMAGE') {
                mediaHtml = `<img class="media-content" src="${mediaUrl}" loading="lazy">`;
            } else {
                // 视频增加自动播放和循环属性
                mediaHtml = `<video class="media-content" src="${mediaUrl}" loop playsinline preload="metadata" poster="${item.thumbnails?.[0] || ''}"></video>`;
            }

            section.innerHTML = `
                ${mediaHtml}
                <div class="info-overlay">
                    <div class="display-name">${item.displayName || '未命名'}</div>
                    <div class="meta-info">${item.mimeType} | ${(item.length / 1024).toFixed(1)} KB</div>
                </div>
                <div class="action-bar">
                    <div class="btn-circle" onclick="window.open('${mediaUrl}')">📥</div>
                    <div class="btn-circle" onclick="copyUrl('${mediaUrl}')">🔗</div>
                </div>
            `;
            container.appendChild(section);
        });

        initObserver();
    }

    // 利用浏览器观察者 API 控制视频播放
    function initObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.target.tagName === 'VIDEO') {
                    if (entry.isIntersecting) {
                        entry.target.play().catch(e => console.warn("自动播放受阻"));
                    } else {
                        entry.target.pause();
                    }
                }
            });
        }, { threshold: 0.6 });

        document.querySelectorAll('video').forEach(v => observer.observe(v));
    }

    // 无限滚动逻辑
    container.addEventListener('scroll', () => {
        if (container.scrollTop + container.clientHeight >= container.scrollHeight - 200) {
            loadMore();
        }
    });

    function copyUrl(url) {
        navigator.clipboard.writeText(url);
        alert('链接已复制');
    }

    // 初始加载
    loadMore();

    // 点击视频/图片切换暂停（针对视频）
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'VIDEO') {
            e.target.paused ? e.target.play() : e.target.pause();
        }
    });
</script>
</body>
</html>
