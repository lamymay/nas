<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>日语学习与生活记录</title>
    <style>
        body {
          font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          max-width: 800px;
          margin: 40px auto;
          line-height: 1.6;
          color: #222;
        }
        h1, h2 {
          border-bottom: 1px solid #ddd;
          padding-bottom: 4px;
        }
        section {
          margin-bottom: 28px;
        }
        label {
          display: block;
          margin: 6px 0;
        }
        input[type="text"],
        textarea {
          width: 100%;
          padding: 6px;
          margin-top: 4px;
          font-size: 14px;
        }
        textarea {
          min-height: 60px;
        }
        .checkbox-group label {
          display: inline-block;
          margin-right: 12px;
        }
    </style>
</head>
<body>

<h1>📘 日语学习与生活记录</h1>

<section>
    <h2>🧠 学习框架</h2>
    <label><input type="checkbox"> 課文</label>
    <label><input type="checkbox"> 文法</label>
    <label><input type="checkbox"> 単語</label>
    <label><input type="checkbox"> リスニング</label>
    <label><input type="checkbox"> スピーキング（音読）</label>
    <label><input type="checkbox"> ライティング</label>
</section>

<section>
    <h2>📌 今日のタスク</h2>
    <label>課文学習の目標
        <textarea></textarea>
    </label>
    <label>文法の目標
        <textarea></textarea>
    </label>
    <label>単語学習の目標
        <textarea></textarea>
    </label>
    <label>その他（スピーチ等）
        <textarea></textarea>
    </label>
</section>

<section>
    <h2>⏱ 学習時間・集中度</h2>
    <label>合計学習時間
        <input placeholder="例：3時間" type="text">
    </label>
    <div class="checkbox-group">
        集中度：
        <label><input name="focus" type="radio"> 高</label>
        <label><input name="focus" type="radio"> 中</label>
        <label><input name="focus" type="radio"> 低</label>
    </div>
</section>

<section>
    <h2>🗣 アウトプットの成果</h2>
    <label>音読
        <textarea placeholder="時間・詰まった箇所など"></textarea>
    </label>
    <label>作文
        <textarea placeholder="文数・不自然だと思った表現など"></textarea>
    </label>
</section>

<section>
    <h2>🎯 N2対策</h2>
    <label>語彙・文法・弱点
        <textarea></textarea>
    </label>
</section>

<section>
    <h2>💼 就職活動</h2>
    <label>活動内容
        <textarea></textarea>
    </label>
</section>

<section>
    <h2>🧘 生活・健康</h2>
    <label>睡眠・運動・体調
        <textarea></textarea>
    </label>
</section>

<section>
    <h2>🔁 振り返り</h2>
    <label>今日できたこと
        <textarea></textarea>
    </label>
    <label>明日改善したいこと
        <textarea></textarea>
    </label>
</section>

</body>
</html>
